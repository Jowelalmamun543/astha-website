<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ডেলিভারি প্যানেল - Astha আস্থা</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { font-family: 'Hind Siliguri', sans-serif; background: #f0fdf4; }
    .status-pending { background: #fef3c7; color: #92400e; }
    .status-processing { background: #dbeafe; color: #1e40af; }
    .status-delivered { background: #dcfce7; color: #166534; }
    .status-cancelled { background: #fee2e2; color: #991b1b; }
    .tab-active { background: #1a7a3c; color: white; }
    .tab-inactive { background: #e5e7eb; color: #374151; }
    .tab-inactive:hover { background: #d1d5db; }
    .stat-card { background: white; border-radius: 16px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); text-align: center; }
    .stat-number { font-size: 28px; font-weight: 800; }
    .order-image { max-width: 150px; max-height: 150px; border-radius: 8px; border: 1px solid #ddd; margin-top: 6px; }
  </style>
</head>
<body>

<script>
  const DELIVERY_PASSWORD = "Delivery@2025";
  if (!sessionStorage.getItem('delivery_logged_in')) {
    const userPass = prompt('🔐 ডেলিভারি প্যানেল খুলতে পাসওয়ার্ড দিন:');
    if (userPass === DELIVERY_PASSWORD) {
      sessionStorage.setItem('delivery_logged_in', 'true');
    } else {
      alert('ভুল পাসওয়ার্ড!');
      window.location.href = 'index.html';
    }
  }
  // ডেলিভারি ম্যানের ইউনিয়ন নির্বাচন (প্রথমবার বা সেশনে না থাকলে)
  if (!sessionStorage.getItem('delivery_man_union')) {
    let activeUnions = {};
    try { activeUnions = JSON.parse(localStorage.getItem('active_unions') || '{"দিগপাইত":true}'); } catch(e) { activeUnions = {'দিগপাইত':true}; }
    const unionList = Object.keys(activeUnions);
    let chosenUnion = '';
    if (unionList.length === 1) {
      chosenUnion = unionList[0];
    } else if (unionList.length > 1) {
      const promptText = '🚩 আপনার ইউনিয়ন কোনটি?\n\n' + unionList.map((u,i) => (i+1)+'. '+u).join('\n') + '\n\nনম্বর লিখুন:';
      const choice = prompt(promptText);
      const idx = parseInt(choice) - 1;
      chosenUnion = (idx >= 0 && idx < unionList.length) ? unionList[idx] : unionList[0];
    } else {
      chosenUnion = 'দিগপাইত';
    }
    sessionStorage.setItem('delivery_man_union', chosenUnion);
  }
  let deliveryManInfo = { name: 'ডেলিভারি ম্যান', union: sessionStorage.getItem('delivery_man_union') };
  sessionStorage.setItem('delivery_man_info', JSON.stringify(deliveryManInfo));
</script>

<header class="bg-[#1D5C87] text-white sticky top-0 z-50 shadow">
  <div class="flex items-center justify-between px-4 py-3 max-w-7xl mx-auto">
    <a href="index.html" class="text-sm font-bold hover:underline"><i class="fas fa-arrow-left"></i> হোম</a>
    <div class="text-center"><h1 class="text-xl font-bold">Astha <span class="text-yellow-300">আস্থা</span></h1><p class="text-[10px] opacity-80">ডেলিভারি প্যানেল</p><p class="text-xs text-yellow-300">📍 ইউনিয়ন: <span id="dmUnionName">দিগপাইত</span></p></div>
    <button onclick="logout()" class="text-sm bg-red-600 px-3 py-1 rounded-lg hover:bg-red-700 transition">লগআউট</button>
  </div>
</header>

<div class="max-w-7xl mx-auto px-4 mt-4">
  <div class="flex flex-wrap gap-2 border-b">
    <button onclick="showTab('dashboard')" id="tab-dashboard" class="tab-active px-4 py-2 rounded-t-lg font-semibold transition">📊 ড্যাশবোর্ড</button>
    <button onclick="showTab('orders')" id="tab-orders" class="tab-inactive px-4 py-2 rounded-t-lg font-semibold transition">📦 অর্ডার</button>
    <button onclick="showTab('products')" id="tab-products" class="tab-inactive px-4 py-2 rounded-t-lg font-semibold transition">🛒 পণ্য</button>
    <button onclick="showTab('prices')" id="tab-prices" class="tab-inactive px-4 py-2 rounded-t-lg font-semibold transition">💰 দাম পরিবর্তন</button>
  </div>
</div>

<!-- ড্যাশবোর্ড -->
<div id="dashboardTab" class="max-w-7xl mx-auto px-4 py-6">
  <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-6">
    <div class="stat-card"><div class="text-gray-500 text-sm">📦 মোট অর্ডার</div><div class="stat-number text-blue-600" id="totalOrders">০</div></div>
    <div class="stat-card"><div class="text-gray-500 text-sm">⏳ বিচারাধীন</div><div class="stat-number text-yellow-600" id="pendingOrders">০</div></div>
    <div class="stat-card"><div class="text-gray-500 text-sm">✅ সম্পন্ন</div><div class="stat-number text-green-600" id="deliveredOrders">০</div></div>
  </div>
  <div class="bg-white rounded-xl shadow-md p-5"><h2 class="text-lg font-bold mb-3 text-green-700">📋 ডেলিভারির জন্য অর্ডার</h2><div id="deliveryOrders"><div class="text-center py-4 text-gray-400">লোড হচ্ছে...</div></div></div>
</div>

<!-- অর্ডার -->
<div id="ordersTab" class="hidden max-w-7xl mx-auto px-4 py-6">
  <div class="bg-white rounded-xl shadow-md p-5">
    <div class="flex flex-wrap justify-between items-center mb-4">
      <h2 class="text-xl font-bold text-green-700"><i class="fas fa-box"></i> ডেলিভারি অর্ডার</h2>
      <div class="flex gap-2 flex-wrap">
        <input type="text" id="orderSearch" placeholder="🔍 খুঁজুন..." class="border rounded-lg px-3 py-1 text-sm">
        <select id="orderFilter" class="border rounded-lg px-2 py-1 text-sm">
          <option value="all">সব</option><option value="pending">⏳ বিচারাধীন</option><option value="processing">🔄 প্রক্রিয়াধীন</option><option value="delivered">✅ সম্পন্ন</option><option value="cancelled">❌ বাতিল</option>
        </select>
        <button onclick="filterDeliveryOrders()" class="bg-blue-600 text-white px-3 py-1 rounded-lg text-sm">ফিল্টার</button>
      </div>
    </div>
    <div id="ordersList" class="space-y-4"><div class="text-center py-8 text-gray-400"><i class="fas fa-spinner fa-spin"></i> লোড হচ্ছে...</div></div>
  </div>
</div>

<!-- পণ্য -->
<div id="productsTab" class="hidden max-w-7xl mx-auto px-4 py-6">
  <div class="grid md:grid-cols-2 gap-6">
    <div class="bg-white rounded-xl shadow-md p-5">
      <h2 class="text-lg font-bold mb-3 text-green-700"><i class="fas fa-plus-circle"></i> নতুন পণ্য যোগ</h2>
      <div class="space-y-3">
        <input type="text" id="prodName" placeholder="পণ্যের নাম" class="w-full border rounded-lg px-3 py-2">
        <select id="prodCat" class="w-full border rounded-lg px-3 py-2">
          <option value="সবজি">সবজি</option><option value="মাছ">মাছ</option><option value="মাংস">মাংস</option>
          <option value="চাল-ডাল">চাল-ডাল</option><option value="মুদি">মুদি</option><option value="তেল">তেল</option>
          <option value="ফল">ফল</option><option value="মসলা">মসলা</option><option value="অন্যান্য">অন্যান্য</option>
        </select>
        <input type="number" id="prodPrice" placeholder="মূল্য (টাকা)" class="w-full border rounded-lg px-3 py-2">
        <select id="prodUnit" class="w-full border rounded-lg px-3 py-2">
          <option value="কেজি">কেজি</option><option value="গ্রাম">গ্রাম</option>
          <option value="লিটার">লিটার</option><option value="ডজন">ডজন</option><option value="টি">টি</option>
        </select>
        <input type="text" id="prodImg" placeholder="ছবির লিংক (URL)" class="w-full border rounded-lg px-3 py-2">
        <input type="text" id="prodBadge" placeholder="ব্যাজ (যেমন: -১০%)" class="w-full border rounded-lg px-3 py-2">
        <button onclick="addProduct()" class="w-full bg-green-600 hover:bg-green-700 text-white py-2 rounded-lg font-bold transition">➕ যোগ করুন</button>
        <p id="productMsg" class="text-sm text-center"></p>
      </div>
    </div>
    <div class="bg-white rounded-xl shadow-md p-5">
      <div class="flex justify-between items-center mb-3">
        <h2 class="text-lg font-bold text-green-700"><i class="fas fa-list"></i> পণ্যের তালিকা</h2>
        <input type="text" id="productSearch" placeholder="🔍 খুঁজুন..." class="border rounded-lg px-3 py-1 text-sm">
        <button onclick="searchProduct()" class="bg-blue-600 text-white px-3 py-1 rounded-lg text-sm">খুঁজুন</button>
      </div>
      <div id="productsList" class="space-y-2 max-h-[500px] overflow-y-auto"><div class="text-center py-4 text-gray-400">লোড হচ্ছে...</div></div>
    </div>
  </div>
</div>

<!-- দাম পরিবর্তন -->
<div id="pricesTab" class="hidden max-w-7xl mx-auto px-4 py-6">
  <div class="bg-white rounded-xl shadow-md p-5">
    <h2 class="text-xl font-bold mb-4 text-green-700"><i class="fas fa-money-bill-wave"></i> পণ্যের দাম পরিবর্তন</h2>
    <div class="grid md:grid-cols-3 gap-4 mb-4">
      <select id="priceProductSelect" class="border rounded-lg px-3 py-2"><option value="">— পণ্য নির্বাচন —</option></select>
      <input type="number" id="newPrice" placeholder="নতুন দাম (টাকা)" class="border rounded-lg px-3 py-2">
      <button onclick="updatePrice()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg font-bold transition">দাম আপডেট</button>
    </div>
    <p id="priceMsg" class="text-sm text-center"></p>
    <div class="border-t pt-4 mt-4">
      <h3 class="font-bold mb-2">📋 পণ্য ও বর্তমান দাম</h3>
      <div id="priceList" class="space-y-2 max-h-[400px] overflow-y-auto"><div class="text-center py-4 text-gray-400">লোড হচ্ছে...</div></div>
    </div>
  </div>
</div>

<script>
let products = [], orders = [];
function getMyUnion() { return sessionStorage.getItem('delivery_man_union') || 'দিগপাইত'; }


const defaultProducts = [
  {id:1,name:'মিনিকেট চাল',cat:'চাল-ডাল',price:65,unit:'কেজি',img:'https://images.unsplash.com/photo-1586201375761-83865001e31c?w=400',badge:''},
  {id:2,name:'রুই মাছ',cat:'মাছ',price:280,unit:'কেজি',img:'https://images.unsplash.com/photo-1615141982883-c7ad0e69fd62?w=400',badge:''},
  {id:3,name:'আলু',cat:'সবজি',price:35,unit:'কেজি',img:'https://images.unsplash.com/photo-1540420773420-3366772f4999?w=400',badge:''},
  {id:4,name:'পেঁয়াজ',cat:'সবজি',price:55,unit:'কেজি',img:'https://images.unsplash.com/photo-1518977676601-b53f82aba655?w=400',badge:''},
  {id:5,name:'ডিম',cat:'দুধ-ডিম',price:12,unit:'টি',img:'https://images.unsplash.com/photo-1548365328-8c6db3220e4d?w=400',badge:''},
  {id:6,name:'খাঁটি মধু',cat:'অন্যান্য',price:350,unit:'২৫০গ্রাম',img:'https://images.unsplash.com/photo-1587049352846-4a222e784d38?w=400',badge:'-১৬%'}
];

function loadData() {
  try {
    products = JSON.parse(localStorage.getItem('astha_products') || JSON.stringify(defaultProducts));
    orders = JSON.parse(localStorage.getItem('astha_orders') || '[]');
  } catch(e) { console.error(e); }
  saveData();
  document.getElementById('dmUnionName').textContent = getMyUnion();
  updateDashboard();
  renderOrders();
  renderProductsList();
  loadPriceDropdowns();
}

function saveData() {
  localStorage.setItem('astha_products', JSON.stringify(products));
  localStorage.setItem('astha_orders', JSON.stringify(orders));
}

// ==================== ড্যাশবোর্ড ====================
function updateDashboard() {
  const union = getMyUnion();
  const unionOrders = orders.filter(o => o.union === union);
  const total = unionOrders.length;
  const pending = unionOrders.filter(o => o.status === 'pending' || !o.status).length;
  const delivered = unionOrders.filter(o => o.status === 'delivered').length;
  document.getElementById('totalOrders').textContent = total;
  document.getElementById('pendingOrders').textContent = pending;
  document.getElementById('deliveredOrders').textContent = delivered;
  const pendingOrders = unionOrders.filter(o => o.status !== 'delivered' && o.status !== 'cancelled').slice(-10).reverse();
  const container = document.getElementById('deliveryOrders');
  if (pendingOrders.length === 0) { container.innerHTML = '<div class="text-center py-4 text-green-600">✅ সব অর্ডার ডেলিভারি সম্পন্ন!</div>'; return; }
  container.innerHTML = pendingOrders.map(o => `
    <div class="flex justify-between items-center border-b py-2 text-sm">
      <div><span class="font-bold">#${o.id}</span> ${o.name}</div>
      <div><span class="px-2 py-0.5 rounded-full text-xs ${o.status === 'delivered' ? 'status-delivered' : o.status === 'processing' ? 'status-processing' : 'status-pending'}">${o.status || 'pending'}</span></div>
      <div><a href="tel:${o.mobile}" class="text-green-600"><i class="fas fa-phone"></i></a></div>
    </div>
  `).join('');
}

// ==================== অর্ডার ====================
function renderOrders() {
  const container = document.getElementById('ordersList');
  if (!container) return;
  const union = getMyUnion();
  const unionOrders = orders.filter(o => o.union === union);
  const deliveryOrders = unionOrders.filter(o => o.status !== 'delivered' && o.status !== 'cancelled');
  if (deliveryOrders.length === 0) {
    container.innerHTML = '<div class="text-center py-8 text-green-600">✅ সব অর্ডার ডেলিভারি সম্পন্ন!</div>';
    return;
  }
  container.innerHTML = deliveryOrders.slice().reverse().map(o => {
    let imageHtml = '';
    if (o.imageData || o.imageUrl) {
      const imgSrc = o.imageData || o.imageUrl;
      imageHtml = `<div class="mt-2"><img src="${imgSrc}" class="order-image" alt="বাজারের ছবি"/></div>`;
    }
    return `
    <div class="border rounded-xl p-4 shadow-sm">
      <div class="flex flex-wrap justify-between items-center border-b pb-2 mb-2 gap-2">
        <div><span class="font-bold">অর্ডার #${o.id}</span> <span class="text-xs text-gray-400">${o.orderDate || ''}</span></div>
        <div><span class="px-2 py-1 rounded-full text-xs ${o.status === 'delivered' ? 'status-delivered' : o.status === 'processing' ? 'status-processing' : 'status-pending'}">${o.status || 'pending'}</span></div>
      </div>
      <div class="grid md:grid-cols-2 gap-3 text-sm">
        <div><p><i class="fas fa-user w-5 text-green-600"></i> ${o.name} (${o.mobile})</p><p><i class="fas fa-map-marker-alt w-5 text-green-600"></i> ${o.village || ''} ${o.union || ''}</p></div>
        <div><p class="font-bold text-green-700">মোট: ${o.total || '৳ ০'}</p></div>
      </div>
      ${imageHtml}
      <div class="mt-3 pt-2 border-t flex gap-3">
        <a href="tel:${o.mobile}" class="bg-green-600 text-white px-4 py-1 rounded-lg text-sm"><i class="fas fa-phone"></i> কল করুন</a>
        <button onclick="markDelivered(${o.id})" class="bg-blue-600 text-white px-4 py-1 rounded-lg text-sm">✅ ডেলিভারি সম্পন্ন</button>
        <button onclick="markCancelled(${o.id})" class="bg-red-600 text-white px-4 py-1 rounded-lg text-sm">❌ বাতিল</button>
      </div>
    </div>
  `).join('');
}

function markDelivered(id) {
  const o = orders.find(x => x.id == id);
  if (o) { o.status = 'delivered'; saveData(); renderOrders(); updateDashboard(); filterDeliveryOrders(); alert('✅ ডেলিভারি সম্পন্ন!'); }
}

function markCancelled(id) {
  if (!confirm('অর্ডারটি বাতিল করতে চান?')) return;
  const o = orders.find(x => x.id == id);
  if (o) { o.status = 'cancelled'; saveData(); renderOrders(); updateDashboard(); alert('❌ অর্ডার বাতিল!'); }
}

function filterDeliveryOrders() {
  const search = document.getElementById('orderSearch').value.toLowerCase();
  const filter = document.getElementById('orderFilter').value;
  const container = document.getElementById('ordersList');
  const union = getMyUnion();
  let filtered = orders.filter(o => o.union === union && o.status !== 'delivered' && o.status !== 'cancelled').slice().reverse();
  if (filter !== 'all') filtered = filtered.filter(o => (o.status || 'pending') === filter);
  if (search) filtered = filtered.filter(o => o.name.toLowerCase().includes(search) || o.id.toString().includes(search));
  if (filtered.length === 0) { container.innerHTML = '<div class="text-center py-8 text-green-600">✅ কোনো অর্ডার নেই</div>'; return; }
  container.innerHTML = filtered.map(o => {
    let imageHtml = '';
    if (o.imageData || o.imageUrl) {
      const imgSrc = o.imageData || o.imageUrl;
      imageHtml = `<div class="mt-2"><img src="${imgSrc}" class="order-image" alt="বাজারের ছবি"/></div>`;
    }
    return `
    <div class="border rounded-xl p-4 shadow-sm">
      <div class="flex flex-wrap justify-between items-center border-b pb-2 mb-2"><div><span class="font-bold">অর্ডার #${o.id}</span> <span class="text-xs text-gray-400">${o.orderDate || ''}</span></div><div><span class="px-2 py-1 rounded-full text-xs ${o.status === 'delivered' ? 'status-delivered' : o.status === 'processing' ? 'status-processing' : 'status-pending'}">${o.status || 'pending'}</span></div></div>
      <div class="grid md:grid-cols-2 gap-3 text-sm"><div><p><i class="fas fa-user w-5 text-green-600"></i> ${o.name} (${o.mobile})</p><p><i class="fas fa-map-marker-alt w-5 text-green-600"></i> ${o.village || ''} ${o.union || ''}</p></div><div><p class="font-bold text-green-700">মোট: ${o.total || '৳ ০'}</p></div></div>
      ${imageHtml}
      <div class="mt-3 pt-2 border-t flex gap-3"><a href="tel:${o.mobile}" class="bg-green-600 text-white px-4 py-1 rounded-lg text-sm"><i class="fas fa-phone"></i> কল</a><button onclick="markDelivered(${o.id})" class="bg-blue-600 text-white px-4 py-1 rounded-lg text-sm">✅ সম্পন্ন</button><button onclick="markCancelled(${o.id})" class="bg-red-600 text-white px-4 py-1 rounded-lg text-sm">❌ বাতিল</button></div>
    </div>
  `).join('');
}

// ==================== পণ্য ====================
function addProduct() {
  const name = document.getElementById('prodName').value.trim();
  const cat = document.getElementById('prodCat').value;
  const price = parseFloat(document.getElementById('prodPrice').value);
  const unit = document.getElementById('prodUnit').value;
  const img = document.getElementById('prodImg').value.trim() || 'https://picsum.photos/100?random='+Date.now();
  const badge = document.getElementById('prodBadge').value.trim();
  const msg = document.getElementById('productMsg');
  if (!name || isNaN(price)) { msg.innerHTML = '⚠️ নাম ও দাম দিন!'; msg.style.color = 'red'; return; }
  products.push({id:Date.now(), name, cat, price, unit, img, badge});
  saveData(); renderProductsList(); loadPriceDropdowns();
  document.getElementById('prodName').value=''; document.getElementById('prodPrice').value='';
  document.getElementById('prodImg').value=''; document.getElementById('prodBadge').value='';
  msg.innerHTML = '✅ পণ্য যোগ হয়েছে!'; msg.style.color = 'green';
  setTimeout(() => msg.innerHTML = '', 2000);
}

function editProduct(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  const n = prompt('নতুন নাম:', p.name);
  const pr = prompt('নতুন দাম:', p.price);
  if (n && pr) { p.name = n; p.price = parseFloat(pr); saveData(); renderProductsList(); loadPriceDropdowns(); }
}

function deleteProduct(id) { if (confirm('পণ্যটি ডিলিট করতে চান?')) { products = products.filter(x => x.id !== id); saveData(); renderProductsList(); loadPriceDropdowns(); } }

function renderProductsList() {
  const container = document.getElementById('productsList');
  if (!container) return;
  if (products.length === 0) { container.innerHTML = '<div class="text-center py-4 text-gray-400">কোনো পণ্য নেই</div>'; return; }
  container.innerHTML = products.map(p => `
    <div class="flex justify-between items-center border-b pb-2">
      <div><span class="font-bold">${p.name}</span> <span class="text-sm text-gray-500">${p.cat} | ৳${p.price}/${p.unit}</span></div>
      <div class="flex gap-2"><button onclick="editProduct(${p.id})" class="text-blue-600"><i class="fas fa-edit"></i></button><button onclick="deleteProduct(${p.id})" class="text-red-600"><i class="fas fa-trash"></i></button></div>
    </div>
  `).join('');
}

function searchProduct() {
  const search = document.getElementById('productSearch').value.toLowerCase();
  const container = document.getElementById('productsList');
  let filtered = products;
  if (search) filtered = products.filter(p => p.name.toLowerCase().includes(search) || p.cat.toLowerCase().includes(search));
  if (filtered.length === 0) { container.innerHTML = '<div class="text-center py-4 text-gray-400">কোনো পণ্য নেই</div>'; return; }
  container.innerHTML = filtered.map(p => `
    <div class="flex justify-between items-center border-b pb-2">
      <div><span class="font-bold">${p.name}</span> <span class="text-sm text-gray-500">${p.cat} | ৳${p.price}/${p.unit}</span></div>
      <div class="flex gap-2"><button onclick="editProduct(${p.id})" class="text-blue-600"><i class="fas fa-edit"></i></button><button onclick="deleteProduct(${p.id})" class="text-red-600"><i class="fas fa-trash"></i></button></div>
    </div>
  `).join('');
}

// ==================== দাম পরিবর্তন ====================
function loadPriceDropdowns() {
  const pSel = document.getElementById('priceProductSelect');
  pSel.innerHTML = '<option value="">— পণ্য নির্বাচন —</option>' + products.map(p => `<option value="${p.id}">${p.name} (বর্তমান: ৳${p.price})</option>`).join('');
  renderPriceList();
}

function updatePrice() {
  const productId = document.getElementById('priceProductSelect').value;
  const newPrice = parseFloat(document.getElementById('newPrice').value);
  const msg = document.getElementById('priceMsg');
  if (!productId || isNaN(newPrice) || newPrice <= 0) { msg.innerHTML = '⚠️ সঠিক পণ্য ও দাম দিন!'; msg.style.color = 'red'; return; }
  const p = products.find(x => x.id == productId);
  if (p) { p.price = newPrice; saveData(); loadPriceDropdowns(); renderProductsList(); 
    msg.innerHTML = `✅ ${p.name}-এর দাম ৳${newPrice} করা হয়েছে!`; msg.style.color = 'green';
    document.getElementById('newPrice').value = '';
    setTimeout(() => msg.innerHTML = '', 3000);
  }
}

function renderPriceList() {
  const container = document.getElementById('priceList');
  if (!container) return;
  if (products.length === 0) { container.innerHTML = '<div class="text-center py-4 text-gray-400">কোনো পণ্য নেই</div>'; return; }
  container.innerHTML = products.map(p => `
    <div class="flex justify-between items-center border-b pb-2">
      <div><span class="font-bold">${p.name}</span></div>
      <div><span class="text-green-700 font-bold">৳${p.price}</span> <span class="text-gray-400 text-sm">/${p.unit}</span></div>
    </div>
  `).join('');
}

// ==================== ট্যাব ====================
function showTab(tab) {
  ['dashboard','orders','products','prices'].forEach(t => {
    document.getElementById(t+'Tab').classList.toggle('hidden', t!==tab);
    document.getElementById('tab-'+t).className = (t===tab ? 'tab-active' : 'tab-inactive') + ' px-4 py-2 rounded-t-lg font-semibold transition';
  });
  if (tab === 'dashboard') updateDashboard();
  if (tab === 'orders') renderOrders();
  if (tab === 'products') { renderProductsList(); loadPriceDropdowns(); }
  if (tab === 'prices') { loadPriceDropdowns(); }
}

function logout() {
  sessionStorage.removeItem('delivery_logged_in');
  sessionStorage.removeItem('delivery_man_info');
  sessionStorage.removeItem('delivery_man_union');
  window.location.href = 'index.html';
}

document.addEventListener('DOMContentLoaded', () => { loadData(); showTab('dashboard'); });
</script>
</body>
</html>
