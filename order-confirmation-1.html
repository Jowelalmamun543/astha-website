<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>অর্ডার কনফার্মেশন - Astha আস্থা</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { font-family: 'Hind Siliguri', sans-serif; background: #f0fdf4; }
    .order-image { max-width: 150px; max-height: 150px; border-radius: 8px; border: 1px solid #ddd; margin-top: 6px; }
  </style>
</head>
<body class="bg-gray-100">

<header class="bg-[#1D5C87] text-white sticky top-0 z-50 shadow">
  <div class="flex items-center justify-between px-4 py-3 max-w-6xl mx-auto">
    <a href="index.html" class="text-sm font-bold hover:underline"><i class="fas fa-home"></i> হোম</a>
    <div class="text-center"><h1 class="text-xl font-bold">Astha <span class="text-yellow-300">আস্থা</span></h1><p class="text-[10px] opacity-80">বিশ্বাসের ঠিকানা</p></div>
    <div class="w-16"></div>
  </div>
</header>

<section class="py-12 px-4">
  <div class="container mx-auto max-w-2xl bg-white rounded-2xl shadow-lg overflow-hidden text-center">
    <div class="bg-[#cfe9da] py-6"><i class="fas fa-check-circle text-[#02804a] text-6xl"></i><h2 class="text-2xl font-bold text-[#026c3e] mt-3">অর্ডার সফল হয়েছে!</h2><p class="text-gray-600 mt-1">আপনার অর্ডারটি গ্রহণ করা হয়েছে।</p></div>
    <div class="p-6">
      <div id="orderInfo" class="bg-gray-50 rounded-xl p-4 text-left mb-6"><p class="text-gray-500 text-sm">লোড হচ্ছে...</p></div>
      <div class="flex flex-col sm:flex-row gap-3 justify-center">
        <a href="orders.html" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg font-bold transition"><i class="fas fa-box"></i> আমার অর্ডার</a>
        <a href="index.html" class="bg-[#02804a] hover:bg-[#026c3e] text-white px-5 py-2 rounded-lg font-bold transition"><i class="fas fa-store"></i> আরও কেনাকাটা করুন</a>
      </div>
    </div>
  </div>
</section>

<footer class="bg-[#1D5C87] text-white mt-8 py-6 text-center text-sm"><p>© ২০২৫ Astha আস্থা | বিশ্বাসের ঠিকানা</p></footer>

<script>
function loadLastOrder() {
  const container = document.getElementById('orderInfo');
  if (!container) return;
  try {
    const orders = JSON.parse(localStorage.getItem('astha_orders') || '[]');
    if (orders.length > 0) {
      const lastOrder = orders[0];
      let imageHtml = '';
      if (lastOrder.imageData) imageHtml = `<div class="mt-2"><img src="${lastOrder.imageData}" class="order-image" alt="বাজারের ছবি"/></div>`;
      else if (lastOrder.imageUrl) imageHtml = `<div class="mt-2"><img src="${lastOrder.imageUrl}" class="order-image" alt="বাজারের ছবি"/></div>`;
      const itemsHtml = lastOrder.items ? lastOrder.items.map(item => `<div class="flex justify-between text-sm border-b pb-1 mb-1"><span>${item.name}</span><span>${item.qty} ${item.unit} × ৳${item.pricePerUnit} = ৳${Math.round(item.total || (item.qty * item.pricePerUnit))}</span></div>`).join('') : (lastOrder.list ? `<p class="text-sm">${lastOrder.list}</p>` : '<p class="text-sm text-gray-400">পণ্যের তথ্য নেই</p>');
      container.innerHTML = `
        <p class="text-gray-500 text-sm mb-2"><i class="fas fa-hashtag"></i> অর্ডার নম্বর: #${lastOrder.id}</p>
        <p class="text-gray-500 text-sm mb-2"><i class="fas fa-calendar"></i> তারিখ: ${lastOrder.orderDate || new Date(lastOrder.timestamp).toLocaleString('bn-BD')}</p>
        <div class="mt-3"><p class="font-semibold text-gray-700">📦 পণ্যের তালিকা:</p>${itemsHtml}</div>
        ${imageHtml}
        <div class="mt-3 pt-2 border-t"><p class="flex justify-between"><span class="font-semibold">মোট দাম:</span> <span class="text-[#026c3e] font-bold">${lastOrder.total || '৳ ০'}</span></p><p class="flex justify-between"><span class="font-semibold">পেমেন্ট:</span> <span>${lastOrder.payment === 'cash' ? 'ক্যাশ অন ডেলিভারি' : (lastOrder.payment === 'bkash' ? 'বিকাশ' : (lastOrder.payment === 'nagad' ? 'নগদ' : 'রকেট'))}</span></p></div>
        <div class="mt-3 pt-2 border-t"><p class="text-sm"><span class="font-semibold">📞 মোবাইল:</span> ${lastOrder.mobile}</p><p class="text-sm"><span class="font-semibold">📍 ঠিকানা:</span> ${lastOrder.village}, ${lastOrder.para ? lastOrder.para + ', ' : ''}${lastOrder.union}, ${lastOrder.upazila}, ${lastOrder.district}</p></div>
      `;
    } else { container.innerHTML = '<p class="text-gray-500">কোনো অর্ডার তথ্য পাওয়া যায়নি।</p>'; }
  } catch(e) { container.innerHTML = '<p class="text-gray-500">অর্ডার তথ্য লোড করতে সমস্যা হয়েছে।</p>'; }
}
document.addEventListener('DOMContentLoaded', loadLastOrder);
</script>
</body>
</html>
