<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>আমার অর্ডারসমূহ - Astha আস্থা</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { font-family: 'Hind Siliguri', sans-serif; background: #f0fdf4; }
    .status-pending { background: #fef3c7; color: #92400e; }
    .status-processing { background: #dbeafe; color: #1e40af; }
    .status-delivered { background: #dcfce7; color: #166534; }
    .status-cancelled { background: #fee2e2; color: #991b1b; }
    .order-image { max-width: 150px; max-height: 150px; border-radius: 8px; border: 1px solid #ddd; margin-top: 6px; }
  </style>
</head>
<body class="bg-gray-100">

<header class="bg-[#1D5C87] text-white sticky top-0 z-50 shadow">
  <div class="flex items-center justify-between px-4 py-3 max-w-6xl mx-auto">
    <a href="index.html" class="text-sm font-bold hover:underline"><i class="fas fa-arrow-left"></i> হোম</a>
    <div class="text-center"><h1 class="text-xl font-bold">Astha <span class="text-yellow-300">আস্থা</span></h1><p class="text-[10px] opacity-80">বিশ্বাসের ঠিকানা</p></div>
    <a href="#" class="text-sm font-bold hover:underline">লগইন</a>
  </div>
</header>

<section class="py-8 px-4">
  <div class="container mx-auto max-w-5xl bg-white rounded-xl shadow-md overflow-hidden">
    <div class="bg-[#e6f4ec] px-6 py-4 border-b"><h2 class="text-xl font-bold text-[#026c3e]"><i class="fas fa-box"></i> আমার অর্ডারসমূহ</h2><p class="text-sm text-gray-500">আপনার করা সব অর্ডার এখানে দেখুন</p></div>
    <div id="ordersList" class="p-4"><div class="text-center py-8 text-gray-400"><i class="fas fa-spinner fa-spin text-2xl"></i><p class="mt-2">অর্ডার লোড হচ্ছে...</p></div></div>
    <div class="bg-gray-50 px-6 py-3 text-center border-t"><a href="index.html" class="inline-block bg-[#02804a] hover:bg-[#026c3e] text-white px-5 py-2 rounded-lg text-sm font-bold transition shadow">🏠 হোমপেজে ফিরুন</a></div>
  </div>
</section>

<footer class="bg-[#1D5C87] text-white mt-8 py-6 text-center text-sm"><p>© ২০২৫ Astha আস্থা | বিশ্বাসের ঠিকানা</p></footer>

<script>
function toBanglaDigits(num) { return num.toString().replace(/[0-9]/g, d => "০১২৩৪৫৬৭৮৯"[d]); }
function getStatusBadge(status) {
  const statusMap = {
    'pending': { text: 'বিচারাধীন', class: 'status-pending' },
    'processing': { text: 'প্রক্রিয়াধীন', class: 'status-processing' },
    'delivered': { text: 'ডেলিভারি সম্পন্ন', class: 'status-delivered' },
    'cancelled': { text: 'বাতিল', class: 'status-cancelled' }
  };
  const s = statusMap[status] || statusMap['pending'];
  return `<span class="px-2 py-1 rounded-full text-xs font-semibold ${s.class}">${s.text}</span>`;
}
function getPaymentIcon(method) {
  const icons = {
    'cash': '<i class="fas fa-money-bill-wave text-[#02804a]"></i> ক্যাশ অন ডেলিভারি',
    'bkash': '<i class="fab fa-bkash text-pink-500"></i> বিকাশ',
    'nagad': '<i class="fas fa-mobile-alt text-orange-500"></i> নগদ',
    'rocket': '<i class="fas fa-rocket text-purple-500"></i> রকেট'
  };
  return icons[method] || '<i class="fas fa-credit-card"></i> অন্যান্য';
}
function loadOrders() {
  const container = document.getElementById('ordersList');
  if (!container) return;
  let orders = [];
  try { const saved = localStorage.getItem('astha_orders'); if (saved) orders = JSON.parse(saved); } catch(e) { console.error('Error loading orders:', e); }
  if (!orders || orders.length === 0) {
    container.innerHTML = `<div class="text-center py-12"><i class="fas fa-inbox text-5xl text-gray-300 mb-3"></i><p class="text-gray-500">আপনার কোনো অর্ডার নেই।</p><a href="index.html" class="inline-block mt-4 bg-[#02804a] text-white px-4 py-2 rounded-lg text-sm">🛒 কেনাকাটা শুরু করুন</a></div>`;
    return;
  }
  let html = '<div class="space-y-4">';
  orders.slice().reverse().forEach(order => {
    const itemCount = order.items ? order.items.length : 0;
    const firstItems = order.items ? order.items.slice(0, 2).map(i => i.name).join(', ') : '';
    const moreItems = itemCount > 2 ? ` + ${itemCount - 2}টি` : '';
    let orderDate = 'তারিখ নেই';
    if (order.orderDate) orderDate = order.orderDate;
    else if (order.timestamp) orderDate = new Date(order.timestamp).toLocaleString('bn-BD');
    let imageHtml = '';
    if (order.imageData) imageHtml = `<div class="mt-2"><img src="${order.imageData}" class="order-image" alt="বাজারের ছবি"/></div>`;
    else if (order.imageUrl) imageHtml = `<div class="mt-2"><img src="${order.imageUrl}" class="order-image" alt="বাজারের ছবি"/></div>`;
    html += `
    <div class="border border-gray-200 rounded-xl overflow-hidden shadow-sm hover:shadow-md transition">
      <div class="bg-gray-50 px-4 py-3 flex flex-wrap justify-between items-center gap-2">
        <div><span class="font-bold text-gray-700">অর্ডার #${order.id}</span><span class="text-xs text-gray-400 ml-2">${orderDate}</span></div>
        <div>${getStatusBadge(order.status || 'pending')}</div>
      </div>
      <div class="p-4">
        <div class="flex flex-wrap justify-between items-start gap-2">
          <div>
            <p class="text-sm text-gray-600"><i class="fas fa-map-marker-alt text-[#02804a] w-5"></i> ${order.union || order.location?.union || ''}, ${order.upazila || order.location?.upazila || ''}, ${order.district || order.location?.district || ''}</p>
            <p class="text-sm text-gray-600 mt-1"><i class="fas fa-user text-[#02804a] w-5"></i> ${order.name}${order.village ? ', ' + order.village : ''}</p>
            <p class="text-sm text-gray-500 mt-1">📦 ${firstItems}${moreItems}</p>
            ${order.list ? `<p class="text-sm text-gray-500 mt-1">📝 ${order.list}</p>` : ''}
          </div>
          <div class="text-right">
            <p class="text-lg font-bold text-[#026c3e]">${order.total || '৳ ০'}</p>
            <p class="text-xs text-gray-400">${getPaymentIcon(order.payment || 'cash')}</p>
          </div>
        </div>
        ${imageHtml}
        <button onclick="toggleOrderDetails(${order.id})" class="mt-3 text-sm text-blue-600 hover:text-blue-800"><i class="fas fa-chevron-down" id="icon-${order.id}"></i> বিস্তারিত দেখুন</button>
        <div id="details-${order.id}" class="hidden mt-3 pt-3 border-t border-gray-100">
          <p class="text-sm font-semibold text-gray-700 mb-2">🛒 পণ্যের তালিকা:</p>
          <div class="space-y-1">
            ${order.items ? order.items.map(item => `<div class="flex justify-between text-sm"><span>${item.name}</span><span>${item.qty} ${item.unit} × ৳${item.pricePerUnit} = ৳${Math.round(item.total || (item.qty * item.pricePerUnit))}</span></div>`).join('') : (order.list ? `<p class="text-sm">${order.list}</p>` : '<p class="text-sm text-gray-400">পণ্যের তথ্য নেই</p>')}
          </div>
          <div class="mt-3 pt-2 border-t">
            <p class="text-sm"><span class="font-semibold">📞 মোবাইল:</span> ${order.mobile}</p>
            <p class="text-sm"><span class="font-semibold">📝 ঠিকানা:</span> ${order.address || '—'}</p>
            ${order.whatsapp ? `<p class="text-sm"><span class="font-semibold">📞 হোয়াটসঅ্যাপ:</span> ${order.whatsapp}</p>` : ''}
          </div>
        </div>
      </div>
    </div>`;
  });
  html += '</div>';
  container.innerHTML = html;
}
function toggleOrderDetails(orderId) {
  const detailsDiv = document.getElementById(`details-${orderId}`);
  const icon = document.getElementById(`icon-${orderId}`);
  if (detailsDiv.classList.contains('hidden')) { detailsDiv.classList.remove('hidden'); icon.classList.remove('fa-chevron-down'); icon.classList.add('fa-chevron-up'); }
  else { detailsDiv.classList.add('hidden'); icon.classList.remove('fa-chevron-up'); icon.classList.add('fa-chevron-down'); }
}
document.addEventListener('DOMContentLoaded', loadOrders);
</script>
</body>
</html>
