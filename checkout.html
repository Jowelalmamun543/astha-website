<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>চেকআউট - Astha আস্থা</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { font-family: 'Hind Siliguri', sans-serif; background: #f0fdf4; }
    .qty-input { width: 70px; padding: 6px; border: 1px solid #d1d5db; border-radius: 8px; text-align: center; }
    .info-row { display: flex; align-items: center; margin-bottom: 12px; }
    .info-label { width: 130px; font-weight: 600; color: #374151; }
    .info-input { flex: 1; }
    .info-input input, .info-input textarea { width: 100%; border: 1px solid #d1d5db; border-radius: 8px; padding: 8px 12px; outline: none; }
    .info-input input:focus, .info-input textarea:focus { border-color: #1a7a3c; }
    .required-star { color: #e74c3c; margin-left: 2px; }
  </style>
</head>
<body class="bg-gray-100">

<header class="bg-[#1D5C87] text-white sticky top-0 z-50 shadow">
  <div class="flex items-center justify-between px-4 py-3 max-w-6xl mx-auto">
    <a href="index.html" class="text-sm font-bold hover:underline"><i class="fas fa-arrow-left"></i> হোম</a>
    <div class="text-center"><h1 class="text-xl font-bold">Astha <span class="text-yellow-300">আস্থা</span></h1><p class="text-[10px] opacity-80">বিশ্বাসের ঠিকানা</p></div>
    <a href="#" class="text-sm font-bold hover:underline">লগইন</a>
  </div>
</header>

<section class="py-6 px-4">
  <div class="container mx-auto max-w-6xl grid md:grid-cols-2 gap-6">
    <div class="bg-white shadow-md rounded-xl p-5">
      <h3 class="text-lg font-bold mb-3 border-b pb-2 text-green-700">📦 অর্ডার সারাংশ</h3>
      <div id="orderSummary" class="text-sm space-y-3"></div>
    </div>
    <div class="bg-white shadow-md rounded-xl p-5">
      <h3 class="text-lg font-bold mb-3 border-b pb-2 text-green-700">👤 ডেলিভারি তথ্য</h3>
      <div class="mb-4 p-3 bg-green-50 rounded-xl space-y-1 text-sm">
        <div><i class="fas fa-map-marker-alt text-green-600 w-5"></i> <strong>জেলা:</strong> <span id="displayDistrict">—</span></div>
        <div><i class="fas fa-map-pin text-green-600 w-5"></i> <strong>উপজেলা:</strong> <span id="displayUpazila">—</span></div>
        <div><i class="fas fa-flag-checkered text-green-600 w-5"></i> <strong>ইউনিয়ন:</strong> <span id="displayUnion">—</span></div>
      </div>
      <form id="checkoutForm">
        <div class="info-row"><div class="info-label">👤 নাম <span class="required-star">*</span></div><div class="info-input"><input type="text" id="name" required></div></div>
        <div class="info-row"><div class="info-label">👨 পিতা/স্বামীর নাম</div><div class="info-input"><input type="text" id="fatherName"></div></div>
        <div class="info-row"><div class="info-label">🏡 গ্রাম <span class="required-star">*</span></div><div class="info-input"><input type="text" id="village" required></div></div>
        <div class="info-row"><div class="info-label">🏠 পাড়া/মহল্লা</div><div class="info-input"><input type="text" id="para"></div></div>
        <div class="info-row"><div class="info-label">📞 মোবাইল নাম্বার <span class="required-star">*</span></div><div class="info-input"><input type="tel" id="mobile" required maxlength="11"></div></div>
        <div class="info-row"><div class="info-label">📝 বিস্তারিত ঠিকানা</div><div class="info-input"><textarea id="address" rows="2"></textarea></div></div>
        <div class="mt-4"><label class="block text-sm font-bold mb-2 text-gray-700">💰 পেমেন্ট মেথড</label>
          <div class="flex flex-wrap gap-3">
            <label class="flex items-center gap-1 text-sm"><input type="radio" name="payment" value="cash" checked> <i class="fas fa-money-bill-wave text-green-600"></i> ক্যাশ অন ডেলিভারি</label>
            <label class="flex items-center gap-1 text-sm"><input type="radio" name="payment" value="bkash"> <i class="fab fa-bkash text-pink-500"></i> বিকাশ</label>
            <label class="flex items-center gap-1 text-sm"><input type="radio" name="payment" value="nagad"> <i class="fas fa-mobile-alt text-orange-500"></i> নগদ</label>
            <label class="flex items-center gap-1 text-sm"><input type="radio" name="payment" value="rocket"> <i class="fas fa-rocket text-purple-500"></i> রকেট</label>
          </div>
        </div>
        <button type="submit" class="w-full mt-5 bg-green-600 hover:bg-green-700 text-white py-3 rounded-xl text-base font-bold shadow transition">✅ অর্ডার কনফার্ম করুন</button>
      </form>
    </div>
  </div>
</section>

<footer class="bg-[#1D5C87] text-white mt-8 py-6 text-center text-sm"><p>© ২০২৫ Astha আস্থা | বিশ্বাসের ঠিকানা</p></footer>

<script>
function toBanglaDigits(num) { return Math.round(num).toString().replace(/[0-9]/g, d => "০১২৩৪৫৬৭৮৯"[d]); }
function toEnglishDigits(str) {
  const ban = "০১২৩৪৫৬৭৮৯", eng = "0123456789";
  return str.split("").map(ch => { let idx = ban.indexOf(ch); return idx > -1 ? eng[idx] : ch; }).join("");
}
function getItemTotal(item) {
  let qty = parseFloat(item.qty);
  if (isNaN(qty) || qty <= 0) return 0;
  if (item.unit === "গ্রাম") return (qty * item.pricePerUnit) / 1000;
  if (item.unit === "টি") return qty * item.pricePerUnit;
  return qty * item.pricePerUnit;
}
let cart = [];
function loadCart() {
  try { const savedCart = localStorage.getItem('astha_cart') || sessionStorage.getItem('db_cart'); if (savedCart) cart = JSON.parse(savedCart); } catch(e) { cart = []; }
  if (!Array.isArray(cart)) cart = [];
  renderOrderSummary();
}
function updateTotals() {
  let subtotal = 0;
  cart.forEach(item => { subtotal += getItemTotal(item); });
  const delivery = subtotal > 500 ? 0 : 40;
  const total = subtotal + delivery;
  document.getElementById('subtotalValue').innerText = `৳ ${toBanglaDigits(subtotal)}`;
  document.getElementById('deliveryValue').innerHTML = delivery === 0 ? 'ফ্রি' : `৳ ${toBanglaDigits(delivery)}`;
  document.getElementById('totalValue').innerText = `৳ ${toBanglaDigits(total)}`;
}
function updateItemUI(index) {
  const item = cart[index];
  const priceSpan = document.getElementById(`price-${index}`);
  if (priceSpan) priceSpan.innerText = `৳ ${toBanglaDigits(getItemTotal(item))}`;
  updateTotals();
}
function handleQtyChange(index, event) {
  let newValue = toEnglishDigits(event.target.value);
  cart[index].qty = newValue === "" ? "" : newValue;
  updateItemUI(index);
}
function handleUnitChange(index, event) {
  cart[index].unit = event.target.value;
  updateItemUI(index);
}
function removeItem(index) {
  if (confirm('এই পণ্যটি সরাতে চান?')) {
    cart.splice(index, 1);
    if (cart.length === 0) { localStorage.removeItem('astha_cart'); sessionStorage.removeItem('db_cart'); }
    renderOrderSummary();
  }
}
function renderOrderSummary() {
  const container = document.getElementById("orderSummary");
  if (!container) return;
  if (cart.length === 0) { container.innerHTML = '<p class="text-center text-gray-500 py-4">🛒 আপনার কার্ট খালি। <a href="index.html" class="text-green-600 underline">পণ্য কিনুন</a></p>'; return; }
  let itemsHtml = '';
  cart.forEach((item, idx) => {
    itemsHtml += `
      <div class="border-b border-gray-200 pb-3 mb-2">
        <div class="flex justify-between items-start">
          <div class="flex gap-2 flex-1">
            <img src="${item.img}" class="w-12 h-12 rounded object-cover">
            <div class="flex-1">
              <div class="font-bold text-gray-800">${item.name}</div>
              <div class="flex items-center gap-2 mt-2 flex-wrap">
                <input type="text" value="${item.qty}" class="qty-input border rounded-lg px-2 py-1 text-center" onchange="handleQtyChange(${idx}, event)" onkeyup="this.onchange()" onblur="this.onchange()">
                <select onchange="handleUnitChange(${idx}, event)" class="border rounded-lg px-2 py-1 text-sm bg-white">
                  <option value="কেজি" ${item.unit === 'কেজি' ? 'selected' : ''}>কেজি</option>
                  <option value="গ্রাম" ${item.unit === 'গ্রাম' ? 'selected' : ''}>গ্রাম</option>
                  <option value="টি" ${item.unit === 'টি' ? 'selected' : ''}>টি</option>
                </select>
                <button onclick="removeItem(${idx})" class="text-red-500 hover:text-red-700"><i class="fas fa-trash-alt"></i></button>
              </div>
              <div class="text-xs text-gray-400 mt-1">প্রতি কেজি: ${item.pricePerUnit} টাকা</div>
            </div>
          </div>
          <div class="font-bold text-green-700 min-w-[70px] text-right" id="price-${idx}">৳ ${toBanglaDigits(getItemTotal(item))}</div>
        </div>
      </div>
    `;
  });
  const html = `
    <div class="space-y-3">
      ${itemsHtml}
      <div class="pt-3 mt-2 border-t-2 border-green-200">
        <div class="flex justify-between text-sm"><span>সাবটোটাল</span><span id="subtotalValue">৳ ০</span></div>
        <div class="flex justify-between text-sm"><span>ডেলিভারি চার্জ</span><span id="deliveryValue">৳ ০</span></div>
        <div class="flex justify-between text-lg font-bold text-green-700 mt-2"><span>মোট দাম</span><span id="totalValue">৳ ০</span></div>
      </div>
    </div>
  `;
  container.innerHTML = html;
  updateTotals();
}
function submitOrder(event) {
  event.preventDefault();
  if (cart.length === 0) { alert('⚠️ আপনার কার্ট খালি। আগে পণ্য যোগ করুন।'); window.location.href = 'index.html'; return; }
  let validItems = cart.filter(item => { let qty = parseFloat(item.qty); return !isNaN(qty) && qty > 0; });
  if (validItems.length === 0) { alert('⚠️ দয়া করে কমপক্ষে একটি পণ্য অর্ডার করুন।'); return; }
  const name = document.getElementById('name').value.trim();
  const village = document.getElementById('village').value.trim();
  const mobile = toEnglishDigits(document.getElementById('mobile').value.trim());
  if (!name || !village || !mobile) { alert('⚠️ অনুগ্রহ করে নাম, গ্রাম ও মোবাইল নম্বর দিন।'); return; }
  if (!/^01[3-9][0-9]{8}$/.test(mobile)) { alert('⚠️ সঠিক ১১ ডিজিটের মোবাইল নম্বর দিন। (যেমন: 01712345678)'); return; }
  const orderData = {
    id: Date.now(),
    district: document.getElementById('displayDistrict').innerText,
    upazila: document.getElementById('displayUpazila').innerText,
    union: document.getElementById('displayUnion').innerText,
    name: name,
    fatherName: document.getElementById('fatherName').value,
    village: village,
    para: document.getElementById('para').value,
    mobile: mobile,
    address: document.getElementById('address').value,
    payment: document.querySelector('input[name="payment"]:checked')?.value || 'cash',
    orderDate: new Date().toLocaleString('bn-BD'),
    items: validItems.map(item => ({ name: item.name, qty: item.qty, unit: item.unit, pricePerUnit: item.pricePerUnit, total: getItemTotal(item) })),
    total: document.getElementById('totalValue')?.innerText || '০'
  };
  let allOrders = [];
  try { const saved = localStorage.getItem('astha_orders'); if (saved) allOrders = JSON.parse(saved); } catch(e) {}
  allOrders.unshift(orderData);
  localStorage.setItem('astha_orders', JSON.stringify(allOrders));
  localStorage.removeItem('astha_cart');
  sessionStorage.removeItem('db_cart');
  alert('✅ আপনার অর্ডার সফল হয়েছে! আমরা শীঘ্রই যোগাযোগ করব।');
  window.location.href = 'order-confirmation.html';
}
function loadDeliveryInfo() {
  try {
    const saved = sessionStorage.getItem('deliveryInfo');
    if (saved) {
      const info = JSON.parse(saved);
      document.getElementById('displayDistrict').innerText = info.district || '—';
      document.getElementById('displayUpazila').innerText = info.upazila || '—';
      document.getElementById('displayUnion').innerText = info.union || '—';
    } else {
      document.getElementById('displayDistrict').innerText = 'নির্বাচিত হয়নি';
      document.getElementById('displayUpazila').innerText = 'নির্বাচিত হয়নি';
      document.getElementById('displayUnion').innerText = 'নির্বাচিত হয়নি';
    }
  } catch(e) {}
}
document.addEventListener('DOMContentLoaded', () => { loadCart(); loadDeliveryInfo(); document.getElementById('checkoutForm').addEventListener('submit', submitOrder); });
</script>
</body>
</html>
