<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>সব পণ্য - Astha আস্থা</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
  <style>
    :root { --green:#02804a; --green-dark:#026c3e; --green-light:#e6f4ec; --blue:#1D5C87; --blue-dark:#174869; --yellow:#f59e0b; --red:#ff4d4f; --gray:#f4f4f4; --shadow:0 2px 12px rgba(0,0,0,.10); }
    *{font-family:'Hind Siliguri',sans-serif;box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--gray);color:#222;}
    a{text-decoration:none;color:inherit;}
    header{background:var(--blue);position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2);}
    .header-top{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;gap:8px;}
    .logo{display:flex;align-items:center;gap:6px;}
    .logo-icon{width:32px;height:32px;background:var(--yellow);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 2px 8px rgba(0,0,0,.2);}
    .logo-text{font-size:20px;font-weight:800;color:white;letter-spacing:.5px;}
    .logo-text span{color:var(--yellow);}
    .back-btn{color:white;font-size:18px;background:none;border:none;cursor:pointer;}
    .search-bar{padding:0 14px 10px;display:flex;gap:8px;}
    .search-bar input{flex:1;padding:10px 14px;border:none;border-radius:10px 0 0 10px;font-size:14px;outline:none;}
    .search-bar button{background:var(--yellow);color:var(--blue-dark);border:none;padding:10px 16px;border-radius:0 10px 10px 0;font-size:16px;cursor:pointer;}
    .products-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:0;}
    @media(min-width:768px){.products-grid{grid-template-columns:repeat(5,1fr);}}
    .product-card{position:relative;background:white;border:1px solid #e5e5e5;overflow:hidden;transition:transform .2s,box-shadow .2s;}
    .product-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.1);}
    .product-img{position:relative;overflow:hidden;}
    .product-img img{width:100%;aspect-ratio:4/5;object-fit:cover;transition:transform 1s ease;display:block;}
    @media(min-width:768px){.product-img img{aspect-ratio:3/4;}}
    .product-card:hover .product-img img{transform:scale(1.12);}
    .badge-disc{position:absolute;top:8px;left:8px;background:var(--red);color:white;font-size:10px;font-weight:800;padding:3px 8px;border-radius:20px;z-index:2;}
    .badge-stock{position:absolute;top:8px;left:8px;background:#6b7280;color:white;font-size:10px;font-weight:800;padding:3px 8px;border-radius:20px;z-index:2;}
    .product-card.out-of-stock{opacity:.65;}
    .product-card.out-of-stock .product-img img{filter:grayscale(40%);}
    .wishlist{position:absolute;top:8px;right:8px;background:white;border:1px solid #ddd;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#ccc;z-index:2;font-size:14px;transition:color .2s;padding:0;}
    .wishlist.active,.wishlist:hover{color:var(--red);}
    .product-actions{position:absolute;left:0;right:0;bottom:-44px;display:grid;grid-template-columns:1fr 1fr;transition:bottom .35s ease;z-index:3;}
    .product-card:hover .product-actions{bottom:0;}
    .btn-detail{background:rgba(29,92,135,.88);color:white;font-size:12px;font-weight:700;padding:10px 4px;text-align:center;border:none;cursor:pointer;transition:background .2s;}
    .btn-detail:hover{background:var(--blue);}
    .btn-cart-p{background:rgba(0,0,0,.62);color:white;font-size:12px;font-weight:700;padding:10px 4px;text-align:center;border:none;cursor:pointer;transition:background .2s;}
    .btn-cart-p:hover,.btn-cart-p.added{background:var(--green);}
    .product-body{padding:7px 8px 8px;}
    .product-name{font-size:12px;font-weight:700;color:#222;margin-bottom:2px;line-height:1.3;}
    .product-unit{font-size:10px;color:#888;margin-bottom:4px;}
    .product-price{font-size:13px;font-weight:800;color:var(--green);}
    .old-price{font-size:11px;font-weight:400;color:#aaa;text-decoration:line-through;margin-left:4px;}
    footer{background:var(--blue);color:white;margin-top:8px;}
    .footer-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:20px 16px 0;}
    @media(min-width:768px){.footer-grid{grid-template-columns:repeat(3,1fr);}}
    .footer-col h4{font-size:13px;font-weight:800;color:var(--yellow);margin-bottom:10px;border-bottom:1px solid rgba(255,255,255,.15);padding-bottom:6px;}
    .footer-col a,.footer-col p{display:block;font-size:12px;color:rgba(255,255,255,.75);margin-bottom:6px;}
    .footer-col a:hover{color:white;}
    .footer-bottom{text-align:center;padding:14px 16px;border-top:1px solid rgba(255,255,255,.1);font-size:11px;color:rgba(255,255,255,.55);margin-top:8px;}
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <button class="back-btn" onclick="window.location.href='index.html'"><i class="fas fa-arrow-left"></i></button>
    <div class="logo"><div class="logo-icon">🤝</div><div class="logo-text">Astha <span>আস্থা</span></div></div>
    <a href="checkout.html" class="text-sm bg-[#02804a] px-3 py-1 rounded-lg hover:bg-[#026c3e] text-white"><i class="fas fa-shopping-cart"></i> <span id="cartBadge">০</span></a>
  </div>
  <div class="search-bar"><input type="text" id="searchInput" placeholder="🔍 পণ্য খুঁজুন..." oninput="filterProducts()"/><button onclick="filterProducts()"><i class="fas fa-search"></i></button></div>
</header>

<div class="products-grid" id="productsGrid"></div>

<footer>
  <div class="footer-grid">
    <div class="footer-col"><h4>Astha আস্থা</h4><p>বিশ্বাসের ঠিকানা</p></div>
    <div class="footer-col"><h4>লিংক</h4><a href="index.html">হোম</a><a href="all-products.html">সব পণ্য</a><a href="orders.html">অর্ডার</a></div>
    <div class="footer-col"><h4>সেবা</h4><p>✅ ক্যাশ অন ডেলিভারি</p><p>✅ সকাল ৬-১টা অর্ডার</p><p>✅ দুপুর ২-৪টা ডেলিভারি</p></div>
  </div>
  <div class="footer-bottom"><p>© ২০২৫ Astha আস্থা | বিশ্বাসের ঠিকানা</p></div>
</footer>

<script>
let allProducts = [];
function loadProducts() {
  try { const saved = localStorage.getItem('astha_products'); allProducts = saved ? JSON.parse(saved) : [
    {id:1,name:'মিনিকেট চাল',cat:'চাল-ডাল',price:65,unit:'কেজি',img:'https://images.unsplash.com/photo-1586201375761-83865001e31c?w=400',badge:'-১৩%'},
    {id:2,name:'রুই মাছ',cat:'মাছ',price:280,unit:'কেজি',img:'https://images.unsplash.com/photo-1615141982883-c7ad0e69fd62?w=400',badge:'-১২%'},
    {id:3,name:'আলু',cat:'সবজি',price:35,unit:'কেজি',img:'https://images.unsplash.com/photo-1540420773420-3366772f4999?w=400',badge:'-২২%'},
    {id:4,name:'পেঁয়াজ',cat:'সবজি',price:55,unit:'কেজি',img:'https://images.unsplash.com/photo-1518977676601-b53f82aba655?w=400',badge:''},
    {id:5,name:'গরুর মাংস',cat:'মাংস',price:720,unit:'কেজি',img:'https://images.unsplash.com/photo-1529692236671-f1f6cf9683ba?w=400',badge:'-১০%'}
  ]; } catch(e){ allProducts=[]; }
  renderProducts(allProducts); updateCartBadge();
}
function renderProducts(products) {
  const grid = document.getElementById('productsGrid');
  if(!grid) return;
  if(products.length===0){ grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;color:#aaa;"><i class="fas fa-box-open text-4xl mb-3"></i><br>কোনো পণ্য পাওয়া যায়নি</div>'; return; }
  grid.innerHTML = products.map(p => {
    const inStock = p.inStock !== false;
    return `<div class="product-card${inStock?'':' out-of-stock'}"><div class="product-img"><img src="${p.img||'https://picsum.photos/300?random='+p.id}" alt="${p.name}" loading="lazy"/>${!inStock?'<span class="badge-stock">স্টক নেই</span>':(p.badge?`<span class="badge-disc">${p.badge}</span>`:'')}<button class="wishlist" onclick="this.classList.toggle('active')">❤</button></div><div class="product-actions"><button class="btn-detail" onclick="window.location.href='product.html?id=${p.id}'">🔍 বিস্তারিত</button>${inStock?`<button class="btn-cart-p" onclick="addToCart(${p.id})">🛒 কার্টে যোগ</button>`:`<button class="btn-cart-p" disabled style="opacity:.5;cursor:not-allowed;">স্টক নেই</button>`}</div><div class="product-body"><div class="product-name">${p.name}</div><div class="product-unit">প্রতি ${p.unit}</div><div class="product-price">৳${p.price}</div></div></div>`;
  }).join('');
}
function getCart(){ try{ return JSON.parse(localStorage.getItem('astha_cart')||'[]'); }catch(e){ return []; } }
function saveCart(c){ localStorage.setItem('astha_cart',JSON.stringify(c)); sessionStorage.setItem('db_cart',JSON.stringify(c)); }
function addToCart(id){
  const p = allProducts.find(x=>x.id===id); if(!p) return;
  if (p.inStock === false) { alert('⚠️ এই পণ্যটি বর্তমানে স্টকে নেই।'); return; }
  let cart = getCart();
  const ex = cart.find(i=>i.id===id && i.unit===p.unit);
  if(ex) ex.qty = (parseFloat(ex.qty)||1) + 1;
  else cart.push({ id: p.id, name: p.name, qty: '1', unit: p.unit, pricePerUnit: p.price, img: p.img || '' });
  saveCart(cart); updateCartBadge();
  const btn = document.querySelector(`[onclick="addToCart(${id})"]`);
  if(btn){ btn.textContent='✅ যোগ হয়েছে'; btn.classList.add('added'); setTimeout(()=>{ btn.textContent='🛒 কার্টে যোগ'; btn.classList.remove('added'); },1200); }
}
function updateCartBadge(){ const cart=getCart(); document.getElementById('cartBadge').textContent=cart.length; }
function filterProducts(){ const q=document.getElementById('searchInput').value.trim().toLowerCase(); if(!q){ renderProducts(allProducts); return; } const filtered=allProducts.filter(p=>p.name.toLowerCase().includes(q)||p.cat.toLowerCase().includes(q)); renderProducts(filtered); }
window.addEventListener('storage', function(e){ if(e.key==='astha_products') loadProducts(); if(e.key==='astha_cart') updateCartBadge(); });
document.addEventListener('DOMContentLoaded', loadProducts);
</script>
</body>
</html>
