<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>পণ্যের বিবরণ - Astha আস্থা</title>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { font-family: 'Hind Siliguri', sans-serif; background: #f0fdf4; }
    .qty-input { width: 100px; padding: 8px; border: 1px solid #d1d5db; border-radius: 8px; text-align: center; }
    #mainImg { transition: opacity 0.2s ease; }
  </style>
</head>
<body class="bg-gray-100">

<header class="bg-[#1D5C87] text-white sticky top-0 z-50 shadow">
  <div class="flex items-center justify-between px-4 py-3 max-w-6xl mx-auto">
    <a href="index.html" class="text-sm font-bold hover:underline"><i class="fas fa-arrow-left"></i> হোম</a>
    <div class="text-center">
      <h1 class="text-xl font-bold">Astha <span class="text-yellow-300">আস্থা</span></h1>
      <p class="text-[10px] opacity-80">বিশ্বাসের ঠিকানা</p>
    </div>
    <a href="checkout.html" class="text-sm font-bold hover:underline relative">
      <i class="fas fa-shopping-cart"></i>
      <span id="cartBadge" class="ml-1 bg-yellow-300 text-blue-900 text-xs font-bold px-1.5 py-0.5 rounded-full">০</span>
    </a>
  </div>
</header>

<!-- লোডিং স্টেট -->
<div id="loadingState" class="py-20 text-center text-gray-400">
  <i class="fas fa-spinner fa-spin text-3xl mb-3"></i>
  <p>পণ্য লোড হচ্ছে...</p>
</div>

<!-- পণ্য পাওয়া যায়নি -->
<div id="notFoundState" class="hidden py-20 text-center">
  <i class="fas fa-box-open text-5xl text-gray-300 mb-4"></i>
  <p class="text-gray-500 text-lg mb-4">পণ্যটি পাওয়া যায়নি।</p>
  <a href="all-products.html" class="bg-[#02804a] text-white px-5 py-2 rounded-lg font-bold">সব পণ্য দেখুন</a>
</div>

<!-- মূল কনটেন্ট -->
<section id="productContent" class="hidden py-6 px-4">
  <div class="container mx-auto max-w-5xl bg-white rounded-2xl shadow-lg overflow-hidden">
    <div class="flex flex-col md:flex-row gap-6 p-6">

      <!-- বাম: ছবি -->
      <div class="flex-1">
        <img id="mainImg" src="" alt="" class="w-full rounded-xl border border-gray-200 shadow-sm object-cover" style="aspect-ratio:4/3;">
      </div>

      <!-- ডান: তথ্য -->
      <div class="flex-1">
        <div id="badgeArea"></div>
        <h1 id="prodName" class="text-2xl md:text-3xl font-extrabold text-[#026c3e] mb-1"></h1>
        <p id="prodCatLine" class="text-gray-500 text-sm mb-3"></p>

        <!-- বিস্তারিত বিবরণ (admin থেকে আসবে) -->
        <div id="descriptionBox" class="hidden bg-[#e6f4ec] p-3 rounded-xl mb-4 text-sm text-gray-700">
          <i class="fas fa-info-circle text-[#02804a] mr-1"></i>
          <span id="prodDescription"></span>
        </div>

        <p id="prodCatFull" class="text-gray-700 mb-1"></p>
        <p id="prodStock" class="text-[#026c3e] font-semibold mb-4"></p>

        <p class="text-3xl font-bold text-[#026c3e] mb-1">
          ৳ <span id="basePriceDisplay"></span>
          <span id="prodUnitLabel" class="text-sm font-normal text-gray-500"></span>
        </p>
        <p id="oldPriceLine" class="text-sm text-gray-400 line-through mb-4 hidden"></p>

        <!-- পরিমাণ -->
        <div class="mb-4">
          <label class="block text-gray-700 font-semibold mb-2">📝 আপনার প্রয়োজনীয় পরিমাণ লিখুন:</label>
          <div class="flex items-center gap-3">
            <input type="text" id="quantityInput" value="1"
              class="qty-input border rounded-lg focus:outline-none focus:ring-2 focus:ring-[#e6f4ec]0">
            <select id="unitSelect"
              class="border rounded-lg px-3 py-2 bg-white focus:outline-none focus:ring-2 focus:ring-[#e6f4ec]0">
              <option value="main">কেজি</option>
              <option value="gram">গ্রাম</option>
              <option value="piece">টি (পিস)</option>
            </select>
          </div>
          <p class="text-xs text-gray-400 mt-1">👉 ২৫০, ৫০০, ৭৫০ বা আপনার পছন্দের সংখ্যা লিখুন</p>
        </div>

        <!-- মোট দাম বক্স -->
        <div class="bg-[#cfe9da] p-3 rounded-xl mb-5 text-center">
          <span class="text-gray-700 font-medium">🧮 মোট দাম :</span>
          <span id="totalPrice" class="text-2xl font-bold text-[#026c3e] ml-2">৳ ০</span>
          <span id="unitText" class="text-sm text-gray-600"></span>
        </div>

        <!-- বাটন -->
        <div class="flex flex-wrap gap-3">
          <button id="addToCartBtn"
            class="flex-1 bg-[#02804a] hover:bg-[#026c3e] text-white font-bold py-2.5 px-4 rounded-xl transition flex items-center justify-center gap-2">
            <i class="fas fa-shopping-cart"></i> কার্টে যোগ করুন
          </button>
          <button id="buyNowBtn"
            class="flex-1 bg-orange-500 hover:bg-orange-600 text-white font-bold py-2.5 px-4 rounded-xl transition flex items-center justify-center gap-2">
            <i class="fas fa-bolt"></i> এখনই কিনুন
          </button>
          <a href="checkout.html"
            class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-5 rounded-xl transition flex items-center justify-center gap-2">
            <i class="fas fa-shopping-bag"></i> চেকআউট
          </a>
        </div>
      </div>

    </div>
  </div>
</section>

<footer class="bg-[#1D5C87] text-white mt-8 py-6 text-center text-sm">
  <p>© ২০২৫ Astha আস্থা | বিশ্বাসের ঠিকানা</p>
</footer>

<script>
// ===== ইউটিলিটি =====
function toBanglaDigits(num) {
  return Math.round(num * 100) / 100 + '';
}
function toEnglishDigits(str) {
  const ban = "০১২৩৪৫৬৭৮৯", eng = "0123456789";
  return str.split("").map(ch => { let idx = ban.indexOf(ch); return idx > -1 ? eng[idx] : ch; }).join("");
}

// ===== ডাটা লোড =====
const defaultProducts = [
  {id:1,name:'মিনিকেট চাল',cat:'চাল-ডাল',price:65,unit:'কেজি',img:'https://images.unsplash.com/photo-1586201375761-83865001e31c?w=500',badge:'-১৩%',description:'উচ্চমানের মিনিকেট চাল। ভাত নরম, সুগন্ধি ও পুষ্টিকর। সরাসরি মিল থেকে সংগ্রহ করা তাজা চাল।'},
  {id:2,name:'রুই মাছ',cat:'মাছ',price:280,unit:'কেজি',img:'https://images.unsplash.com/photo-1615141982883-c7ad0e69fd62?w=500',badge:'-১২%',description:'তাজা রুই মাছ, সরাসরি পুকুর থেকে আনা।'},
  {id:3,name:'আলু',cat:'সবজি',price:35,unit:'কেজি',img:'https://images.unsplash.com/photo-1540420773420-3366772f4999?w=500',badge:'-২২%',description:''},
  {id:4,name:'পেঁয়াজ',cat:'সবজি',price:55,unit:'কেজি',img:'https://images.unsplash.com/photo-1518977676601-b53f82aba655?w=500',badge:'',description:''},
  {id:5,name:'গরুর মাংস',cat:'মাংস',price:720,unit:'কেজি',img:'https://images.unsplash.com/photo-1529692236671-f1f6cf9683ba?w=500',badge:'-১০%',description:''},
  {id:6,name:'মসুর ডাল',cat:'চাল-ডাল',price:110,unit:'কেজি',img:'https://images.unsplash.com/photo-1574323347407-f5e1ad6d020b?w=500',badge:'-১৫%',description:''},
  {id:7,name:'সরিষার তেল',cat:'তেল',price:180,unit:'লিটার',img:'https://images.unsplash.com/photo-1474979266404-7eaacbcd87c5?w=500',badge:'-১০%',description:''},
  {id:8,name:'টমেটো',cat:'সবজি',price:40,unit:'কেজি',img:'https://images.unsplash.com/photo-1582284540020-8acbe03f4924?w=500',badge:'-২০%',description:''},
  {id:9,name:'ইলিশ মাছ',cat:'মাছ',price:850,unit:'কেজি',img:'https://images.unsplash.com/photo-1615141982883-c7ad0e69fd62?w=500',badge:'-১৫%',description:''},
  {id:10,name:'খাঁটি মধু',cat:'অন্যান্য',price:350,unit:'২৫০গ্রাম',img:'https://images.unsplash.com/photo-1587049352846-4a222e784d38?w=500',badge:'-১৬%',description:''},
  {id:11,name:'দেশি মুরগি',cat:'মাংস',price:380,unit:'কেজি',img:'https://images.unsplash.com/photo-1518492104633-130d0cc84637?w=500',badge:'-১৫%',description:''},
  {id:12,name:'গাওয়া ঘি',cat:'দুধ-ডিম',price:420,unit:'২৫০গ্রাম',img:'https://images.unsplash.com/photo-1550583724-b2692b85b150?w=500',badge:'-১৬%',description:''},
  {id:13,name:'কাঁচা মরিচ',cat:'সবজি',price:60,unit:'কেজি',img:'https://images.unsplash.com/photo-1596040033229-a9821ebd058d?w=500',badge:'-২৫%',description:''},
  {id:14,name:'ডিম',cat:'দুধ-ডিম',price:120,unit:'ডজন',img:'https://images.unsplash.com/photo-1548365328-8c6db3220e4d?w=500',badge:'-১০%',description:''},
  {id:15,name:'নারকেল তেল',cat:'তেল',price:220,unit:'৫০০মিলি',img:'https://images.unsplash.com/photo-1474979266404-7eaacbcd87c5?w=500',badge:'-১৫%',description:''},
];

function getAllProducts() {
  try {
    const s = localStorage.getItem('astha_products');
    return s ? JSON.parse(s) : defaultProducts;
  } catch(e) { return defaultProducts; }
}

// ===== কার্ট =====
function getCart() {
  try { return JSON.parse(localStorage.getItem('astha_cart') || '[]'); } catch(e) { return []; }
}
function saveCart(cart) {
  localStorage.setItem('astha_cart', JSON.stringify(cart));
  sessionStorage.setItem('db_cart', JSON.stringify(cart));
}
function updateCartBadge() {
  const cart = getCart();
  // সংখ্যা = কার্টে কতটি আলাদা পণ্য আছে
  const badge = document.getElementById('cartBadge');
  if (badge) badge.textContent = cart.length;
}
function addToCart(product, qty, unit) {
  let cart = getCart();
  const existing = cart.find(item => item.id === product.id && item.unit === unit);
  if (existing) {
    existing.qty = (parseFloat(existing.qty) + qty).toString();
  } else {
    cart.push({
      id: product.id, name: product.name,
      qty: qty.toString(), unit: unit,
      pricePerUnit: product.price,
      img: product.img || ''
    });
  }
  saveCart(cart);
  updateCartBadge();
}

// ===== দাম হিসাব =====
let currentProduct = null;

function calculatePrice() {
  if (!currentProduct) return;
  let qty = parseFloat(toEnglishDigits(document.getElementById('quantityInput').value));
  if (isNaN(qty) || qty <= 0) qty = 1;
  const unitType = document.getElementById('unitSelect').value;
  const basePrice = currentProduct.price;
  let total = 0, displayUnit = '';
  if (unitType === 'main') {
    total = qty * basePrice;
    displayUnit = qty + ' ' + currentProduct.unit;
  } else if (unitType === 'gram') {
    total = (qty / 1000) * basePrice;
    displayUnit = qty + ' গ্রাম';
  } else {
    total = qty * (basePrice / 10);
    displayUnit = qty + ' টি';
  }
  document.getElementById('totalPrice').textContent = '৳ ' + toBanglaDigits(total);
  document.getElementById('unitText').textContent = '(' + displayUnit + ')';
}

// ===== পণ্য রেন্ডার =====
function renderProduct(p) {
  currentProduct = p;

  document.getElementById('mainImg').src = p.img || 'https://picsum.photos/500?random=' + p.id;
  document.getElementById('mainImg').alt = p.name;
  document.getElementById('prodName').textContent = p.name;
  document.getElementById('prodCatLine').textContent = '🔖 ' + (p.cat || '') + (p.brand ? ' / ' + p.brand : '');
  document.getElementById('basePriceDisplay').textContent = p.price;
  document.getElementById('prodUnitLabel').textContent = '/ ' + (p.unit || 'কেজি');
  document.getElementById('prodCatFull').innerHTML = '<strong>📦 ক্যাটাগরি:</strong> ' + (p.cat || '—');
  const inStock = p.inStock !== false;
  const stockEl = document.getElementById('prodStock');
  if (inStock) {
    stockEl.innerHTML = '<strong>✅ স্টক:</strong> স্টকে আছে (তাজা)';
    stockEl.className = 'text-[#026c3e] font-semibold mb-4';
  } else {
    stockEl.innerHTML = '<strong>❌ স্টক:</strong> বর্তমানে স্টকে নেই';
    stockEl.className = 'text-red-600 font-semibold mb-4';
  }
  const addBtn = document.getElementById('addToCartBtn');
  const buyBtn = document.getElementById('buyNowBtn');
  if (!inStock) {
    addBtn.disabled = true; addBtn.style.opacity = '.5'; addBtn.style.cursor = 'not-allowed'; addBtn.innerHTML = '<i class="fas fa-times-circle"></i> স্টক নেই';
    buyBtn.disabled = true; buyBtn.style.opacity = '.5'; buyBtn.style.cursor = 'not-allowed'; buyBtn.innerHTML = '<i class="fas fa-times-circle"></i> স্টক নেই';
  }

  // unit dropdown — প্রথম অপশন পণ্যের unit দিয়ে সেট
  document.getElementById('unitSelect').options[0].text = p.unit || 'কেজি';

  // বিস্তারিত বিবরণ
  if (p.description && p.description.trim()) {
    document.getElementById('prodDescription').textContent = p.description;
    document.getElementById('descriptionBox').classList.remove('hidden');
  } else {
    document.getElementById('descriptionBox').classList.add('hidden');
  }

  // ব্যাজ
  const badgeArea = document.getElementById('badgeArea');
  if (p.badge) {
    badgeArea.innerHTML = `<span class="inline-block bg-red-500 text-white text-xs font-bold px-3 py-1 rounded-full mb-2">${p.badge}</span>`;
  } else {
    badgeArea.innerHTML = '';
  }

  // পুরনো দাম (badge থেকে % বের করে)
  const oldPriceLine = document.getElementById('oldPriceLine');
  if (p.badge && p.badge.includes('%')) {
    const pct = parseFloat(p.badge.replace(/[^0-9]/g, ''));
    if (!isNaN(pct) && pct > 0) {
      const oldPrice = Math.round(p.price / (1 - pct / 100));
      oldPriceLine.textContent = '৳ ' + oldPrice;
      oldPriceLine.classList.remove('hidden');
    }
  } else {
    oldPriceLine.classList.add('hidden');
  }

  calculatePrice();

  // কনটেন্ট দেখাও
  document.getElementById('loadingState').classList.add('hidden');
  document.getElementById('productContent').classList.remove('hidden');
}

// ===== URL থেকে ID পড়া =====
function getProductIdFromURL() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  return id ? parseInt(id) : null;
}

// ===== ইনিট =====
document.addEventListener('DOMContentLoaded', () => {
  updateCartBadge();
  const id = getProductIdFromURL();
  const allProducts = getAllProducts();

  let product = null;
  if (id) {
    product = allProducts.find(p => p.id == id);
  }
  if (!product) {
    // id না থাকলে বা না পেলে প্রথম পণ্য দেখাও
    product = allProducts[0] || null;
  }

  if (!product) {
    document.getElementById('loadingState').classList.add('hidden');
    document.getElementById('notFoundState').classList.remove('hidden');
    return;
  }

  renderProduct(product);

  document.getElementById('quantityInput').addEventListener('input', calculatePrice);
  document.getElementById('unitSelect').addEventListener('change', calculatePrice);

  document.getElementById('addToCartBtn').addEventListener('click', () => {
    if (product.inStock === false) { alert('⚠️ এই পণ্যটি বর্তমানে স্টকে নেই।'); return; }
    let qty = parseFloat(toEnglishDigits(document.getElementById('quantityInput').value));
    if (isNaN(qty) || qty <= 0) qty = 1;
    const unit = document.getElementById('unitSelect').options[document.getElementById('unitSelect').selectedIndex].text;
    addToCart(product, qty, unit);
    const btn = document.getElementById('addToCartBtn');
    btn.innerHTML = '<i class="fas fa-check"></i> যোগ হয়েছে!';
    btn.classList.replace('bg-[#02804a]', 'bg-[#015230]');
    setTimeout(() => {
      btn.innerHTML = '<i class="fas fa-shopping-cart"></i> কার্টে যোগ করুন';
      btn.classList.replace('bg-[#015230]', 'bg-[#02804a]');
    }, 1500);
  });

  document.getElementById('buyNowBtn').addEventListener('click', () => {
    if (product.inStock === false) { alert('⚠️ এই পণ্যটি বর্তমানে স্টকে নেই।'); return; }
    let qty = parseFloat(toEnglishDigits(document.getElementById('quantityInput').value));
    if (isNaN(qty) || qty <= 0) qty = 1;
    const unit = document.getElementById('unitSelect').options[document.getElementById('unitSelect').selectedIndex].text;
    addToCart(product, qty, unit);
    window.location.href = 'checkout.html';
  });
});
</script>

</body>
</html>
